name: Deploy to Google Cloud Run - Reuse Workflow
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  workflow:
    uses: julio2019vp/templates-jvp/.github/workflows/workflow-reuse.yml@main

    with:
      IMAGE_NAME: "mi-aplicacion-java"
      IMAGE_TAG: "latest"
      DOCKERFILE_PATH: "Dockerfile"
      ACR_REGISTRY: "registryjvp.azurecr.io"
    secrets: inherit
